# 在 deploy 目录执行: docker compose up -d --build
# 详见 DEPLOY-MAINLAND.md

name: zstp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_self_learning
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_self_learning"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ai_self_learning
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      UPLOAD_DIR: /app/uploads
      PORT: "5000"
      # 可按需覆盖默认演示账号（勿在公网使用弱密码）
      # APP_BOOTSTRAP_USERS_0_PASSWORD: ...
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      # 仅本机访问，由宿主机 Nginx 终止 TLS 并反代到此端口
      - "127.0.0.1:8080:80"
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:
  uploads:

networks:
  internal:
    driver: bridge

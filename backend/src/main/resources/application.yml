server:
  port: ${PORT:5000}

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ai_self_learning}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:2022S3414ycx}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  seed:
    # 控制是否在应用启动时插入默认知识点，默认关闭（false）
    knowledge: false
    # 控制是否在启动时清空旧数据并插入示例（用于演示/初始化新关系），默认关闭
    examples: false
  bootstrap-users:
    - username: ${APP_BOOTSTRAP_USERS_0_USERNAME:student_demo}
      email: ${APP_BOOTSTRAP_USERS_0_EMAIL:student@example.com}
      password: ${APP_BOOTSTRAP_USERS_0_PASSWORD:student123}
      role: ${APP_BOOTSTRAP_USERS_0_ROLE:student}
    - username: ${APP_BOOTSTRAP_USERS_1_USERNAME:teacher_demo}
      email: ${APP_BOOTSTRAP_USERS_1_EMAIL:teacher@example.com}
      password: ${APP_BOOTSTRAP_USERS_1_PASSWORD:teacher123}
      role: ${APP_BOOTSTRAP_USERS_1_ROLE:teacher}
